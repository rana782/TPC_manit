<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer yellow circle -->
  <circle cx="100" cy="100" r="98" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  <!-- White ring -->
  <circle cx="100" cy="100" r="85" fill="white" stroke="#DAA520" stroke-width="1"/>
  <!-- Blue inner circle -->
  <circle cx="100" cy="100" r="70" fill="#1a237e"/>
  
  <!-- Tower/Building silhouette -->
  <!-- Main building body -->
  <rect x="75" y="55" width="50" height="55" fill="#c62828" rx="2"/>
  <!-- Tower top -->
  <rect x="85" y="40" width="30" height="20" fill="#c62828" rx="1"/>
  <rect x="95" y="28" width="10" height="15" fill="#c62828"/>
  <!-- Antenna -->
  <line x1="100" y1="15" x2="100" y2="28" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="90" y1="22" x2="110" y2="22" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="93" y1="18" x2="107" y2="18" stroke="#FFD700" stroke-width="1.5"/>
  <!-- Windows -->
  <rect x="82" y="60" width="8" height="10" fill="#1a237e" rx="1"/>
  <rect x="96" y="60" width="8" height="10" fill="#1a237e" rx="1"/>
  <rect x="110" y="60" width="8" height="10" fill="#1a237e" rx="1"/>
  <rect x="82" y="78" width="8" height="10" fill="#1a237e" rx="1"/>
  <rect x="96" y="78" width="8" height="10" fill="#1a237e" rx="1"/>
  <rect x="110" y="78" width="8" height="10" fill="#1a237e" rx="1"/>
  <!-- Base -->
  <rect x="65" y="108" width="70" height="8" fill="#c62828" rx="1"/>
  
  <!-- Top curved text - MANIT -->
  <path id="topArc" d="M 30,100 A 70,70 0 0,1 170,100" fill="none"/>
  <text font-size="10" font-weight="bold" fill="#1a237e" font-family="Arial, sans-serif">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      MAULANA AZAD NATIONAL INSTITUTE OF TECHNOLOGY
    </textPath>
  </text>
  
  <!-- Bottom text -->
  <rect x="55" y="125" width="90" height="20" rx="10" fill="#FFD700" stroke="#DAA520" stroke-width="0.5"/>
  <text x="100" y="139" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a237e" font-family="Arial, sans-serif">BHOPAL</text>
  
  <!-- Bottom outer text -->
  <path id="bottomArc" d="M 25,110 A 80,80 0 0,0 175,110" fill="none"/>
  <text font-size="9" font-weight="bold" fill="#1a237e" font-family="Arial, sans-serif">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      विद्या परं भूषणं
    </textPath>
  </text>
</svg>
