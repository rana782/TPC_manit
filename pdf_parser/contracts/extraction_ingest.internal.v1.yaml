openapi: 3.1.0
info:
  title: Extraction service ingest (called by Upload service)
  version: 1.0.0
  description: |
    Internal boundary between Upload and Extraction services. The upload worker POSTs the stored
    file as multipart form-data together with routing metadata. The extraction service owns
    Nanonets calls and must not leak raw vendor payloads to public clients.
servers:
  - url: http://extraction-service:8002
paths:
  /v1/internal/ingest:
    post:
      summary: Accept forwarded blob for extraction pipeline
      operationId: ingestForwardedDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, document_id, job_id]
              properties:
                file:
                  type: string
                  format: binary
                document_id:
                  type: string
                  format: uuid
                job_id:
                  type: string
                  format: uuid
                user_id:
                  type: string
                json_options:
                  type: string
                  description: Passed verbatim to Nanonets as json_options (always with output_format=json).
                json_schema:
                  type: string
                  description: JSON text minified into json_options when json_options is omitted.
      responses:
        "200":
          description: Nanonets terminal JSON payload (sync completion or async poll completion)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "202":
          description: Possible Nanonets async queue response (if returned without polling)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid payload (multipart validation / invalid json_schema)
        "413":
          description: Upload exceeds max_ingest_bytes
        "502":
          description: Nanonets unreachable after retries
        "503":
          description: Missing NANONETS_API_KEY
        "504":
          description: Async polling timed out
