openapi: 3.1.0
info:
  title: Document Job + Persistence Service
  version: 1.2.0
  description: |
    Job lifecycle: **queued** → **processing** → **completed** or **failed**.
    Poll `GET /v1/jobs/{job_id}`. Re-queue failed jobs with internal retry (or gateway proxy).
servers:
  - url: http://localhost:8004
paths:
  /v1/jobs/{job_id}:
    get:
      summary: Poll job status + persisted artifacts
      operationId: getJobPublic
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobPublicResponse"
        "404":
          description: Not found
components:
  schemas:
    JobPublicResponse:
      type: object
      required: [job_id, document_id, status, retry_count, max_job_retries, retries_remaining]
      properties:
        job_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        user_id:
          type: string
          nullable: true
        status:
          type: string
          description: queued | processing | completed | failed
        retry_count:
          type: integer
          description: Number of retry re-queues applied after failures.
        max_job_retries:
          type: integer
          description: Server-side cap on retry calls (env MAX_JOB_RETRIES).
        retries_remaining:
          type: integer
          description: Remaining retry attempts when status is failed (0 otherwise).
        extracted_text:
          type: string
          nullable: true
        result:
          nullable: true
          description: Full normalized_output JSON when present
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
