openapi: 3.1.0
info:
  title: Document Extraction Service (internal)
  version: 1.0.0
  description: |
    Nanonets integration layer. Successful responses echo Nanonets HTTP status and JSON body
    without transformation. Operational errors (missing API key, oversized upload, poll timeout)
    use FastAPI JSON error shapes.
servers:
  - url: http://localhost:8002
paths:
  /v1/internal/ingest:
    post:
      summary: Forward blob to Nanonets (sync or async+poll)
      operationId: internalIngest
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, document_id, job_id]
              properties:
                file:
                  type: string
                  format: binary
                document_id:
                  type: string
                  format: uuid
                job_id:
                  type: string
                  format: uuid
                user_id:
                  type: string
                role:
                  type: string
                  enum: [student, admin]
                doc_tag:
                  type: string
                  enum: [resume, jd, marksheet]
                json_options:
                  type: string
                  description: Nanonets json_options string (field list, flags, or JSON Schema text).
                json_schema:
                  type: string
                  description: JSON text minified into json_options when json_options is omitted.
      responses:
        "200":
          description: Nanonets response (typical for sync completion)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "202":
          description: Nanonets response (possible immediate async queue payload)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Client validation error (this service)
        "413":
          description: Upload too large for configured max_ingest_bytes
        "429":
          description: Nanonets rate limit (after retries, if still limited)
        "502":
          description: Upstream transport failures after retries
        "503":
          description: Missing NANONETS_API_KEY
        "504":
          description: Async polling exceeded poll_timeout_seconds
  /v1/health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
